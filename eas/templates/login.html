{% extends "base.html" %}
{% block content %}

<style>
body {
    background: linear-gradient(
        135deg,
        #B6FFFA 0%,
        #98E4FF 30%,
        #80B3FF 60%,
        #687EFF 100%
    );
    background-attachment: fixed;
}

.login-wrapper {
    max-width: 900px;
    margin: auto;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: #80B3FF 0px 19px 38px, #80B3FF 0px 15px 12px;
    display: flex;
    min-height: 500px;
    
}

.login-left {
    flex: 1;
    background: #ffffffff; /* gradient light purple */
   
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
}

.login-left img {
    width: 100%;
    max-width: 330px;
    border-radius: 15px;
}

.login-right {
    flex: 1;
    padding: 50px 40px;
}

.login-right label {
        color: #687eff;
    font-weight: 700;
}

.input-style {
    border-radius: 10px;
    height: 50px;
    border: 2px solid #98e4ff;
    transition: 0.25s ease;
}

/* HOVER */
.input-style:hover {
    border-color: #80b3ff;
}

/* FOCUS (glow gradient) */
.input-style:focus {
    border-color: #6a8aff;
    box-shadow: 0px 0px 10px rgba(106, 138, 255, 0.4),
                0px 0px 15px rgba(152, 228, 255, 0.3);
}


/* BUTTON GRADIENT */
.btn-login {
    height: 50px;
    border-radius: 12px;
    border: none;
    font-size: 17px;
    font-weight: 600;
    color: #5a78e6;
    cursor: pointer;

    background: radial-gradient(
        circle at 0% 0%,
        #6a8aff,
        #b6fffa,
        #98e4ff,
        #80b3ff
    );

    transition: 0.3s ease-in-out;
}

/* HOVER = GRADIENT LEBIH TEGAS */
.btn-login:hover {
    background: radial-gradient(
        circle at 100% 100%,
        #5a78e6,
        #8fe9e0,
        #78c8ff,
        #5f9fff
    );
    transform: translateY(-2px);
}



.login-right {
    flex: 1;
    padding: 0 40px;
    display: flex;
    justify-content: center;   /* center vertical */
    align-items: center;       /* center horizontal */
}

.login-right-inner {
    width: 100%;
    max-width: 330px;
    text-align: center;        /* center text */
}


</style>

<div class="login-wrapper" style="margin-top:100px; margin-bottom:50px;">

    <!-- LEFT IMAGE SIDE -->
    <div class="login-left">
        <img src="/static/img/logo-hor.png" alt="Login Illustration">
    </div>

    <!-- RIGHT FORM SIDE -->
    <div class="login-right">
    <div class="login-right-inner">

        <h2 style="color: #687EFF;font-weight: 700;">Hi User!</h2>
        <p class="" style="color: #9dadc4ff;">Welcome back, ready to do work?</p>

        <form method="POST">

            <div class="mt-4 text-start">
                <label class="mb-3">Username</label>
                <input class="form-control input-style" name="username" required placeholder="Enter username">
            </div>

            <div class="mt-3 text-start">
                <label class="mb-3">Password</label>
                <input type="password" class="form-control input-style" name="password" required placeholder="Enter password">
            </div>

            <button class="btn btn-login w-100 mt-4">Sign In</button>

        </form>

      

    </div>
</div>


</div>

{% endblock %}
