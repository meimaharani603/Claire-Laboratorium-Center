{% extends "admin/dashboard.html" %}
{% set active = 'tests' %}
{% block admin_content %}

<h4>{{ 'Edit Tes' if test else 'Tambah Tes' }}</h4>

<form method="post" class="card p-4 shadow-sm">

    <div class="mb-3">
        <label>Kode</label>
        <input name="code" class="form-control" value="{{ test.code if test else '' }}">
    </div>

    <div class="mb-3">
        <label>Nama Tes</label>
        <input name="name" class="form-control" value="{{ test.name if test else '' }}">
    </div>

    <div class="mb-3">
        <label>Deskripsi</label>
        <textarea name="description" class="form-control">{{ test.description if test else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label>Harga</label>
        <input name="price" class="form-control" value="{{ test.price if test else '' }}">
    </div>

    <div class="mb-3 form-check">
        <input type="checkbox" name="active" class="form-check-input" {% if test and test.active %}checked{% endif %}>
        <label class="form-check-label">Aktif</label>
    </div>

    <button class="btn btn-success">Simpan</button>

</form>

{% endblock %}
