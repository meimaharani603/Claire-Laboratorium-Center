{% extends "base.html" %}
{% block content %}

<h3>{{ 'Edit Pasien' if patient else 'Tambah Pasien' }}</h3>

<form method="post" class="card p-4 shadow-sm">

    <!-- MRN otomatis: tampil hanya jika edit -->
    <label class="form-label">MRN</label>
    <input class="form-control mb-2" name="medical_record_number" 
           value="{{ patient.medical_record_number if patient else generated_mrn }}" 
           readonly>

    <!-- Nama -->
    <label class="form-label">Nama</label>
    <input class="form-control mb-2" name="name" 
           value="{{ patient.name if patient else '' }}" required>

    <!-- Tanggal lahir pakai date -->
    <label class="form-label">Tanggal Lahir</label>
    <input type="date" class="form-control mb-2" name="birth_date" 
           value="{{ patient.birth_date if patient else '' }}" required>

    <!-- Gender dropdown -->
    <label class="form-label">Gender</label>
    <select class="form-select mb-2" name="gender" required>
        <option value="">-- Pilih Gender --</option>
        <option value="Laki-laki" 
            {% if patient and patient.gender == 'Laki-laki' %} selected {% endif %}>
            Laki-laki
        </option>
        <option value="Perempuan" 
            {% if patient and patient.gender == 'Perempuan' %} selected {% endif %}>
            Perempuan
        </option>
    </select>

    <!-- Alamat -->
    <label class="form-label">Alamat</label>
    <textarea class="form-control mb-2" name="address" required>
        {{ patient.address if patient else '' }}
    </textarea>

    <!-- Telepon -->
    <label class="form-label">Telepon</label>
    <input type="tel" pattern="[0-9]{8,15}" class="form-control mb-3" name="phone" 
           placeholder="Contoh: 081234567890"
           value="{{ patient.phone if patient else '' }}" required>

    <button class="btn btn-success">Simpan</button>

</form>

{% endblock %}
